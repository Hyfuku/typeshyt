name: Deploy auf goserver

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: git pull auf dem Webserver ausführen
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H s71.goserver.host >> ~/.ssh/known_hosts 2>/dev/null
          ssh web23@s71.goserver.host 'cd /home/www/alexanderkhuu.de/typeshyt && git pull --ff-only'
